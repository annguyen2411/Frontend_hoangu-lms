[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[context.production.environment]
  VITE_API_URL = "https://hoangu-lms-api.onrender.com/api"

[[redirects]]
  from = "/api/*"
  to = "https://hoangu-lms-api.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob: *.unsplash.com; font-src 'self' data:; connect-src 'self' https://hoangu-lms-api.onrender.com https://hoangu.techhave.com https://*.unsplash.com https://*.supabase.co wss: https:; media-src 'self' https: blob:; object-src 'none';"
